<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login — Mood & Mind Centre</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep: #2c3e35;
      --sage: #5a7a6a;
      --sage-light: #e8f0ec;
      --warm: #c8956c;
      --cream: #faf8f5;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo .mark {
      width: 56px;
      height: 56px;
      background: var(--deep);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .login-logo .mark svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
    }

    .login-logo h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--deep);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .login-logo p {
      font-size: 0.8rem;
      color: var(--sage);
      margin-top: 4px;
      font-family: 'Arial', sans-serif;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 32px rgba(44,62,53,0.10);
    }

    .login-card h2 {
      font-size: 1.4rem;
      color: var(--deep);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .login-card p {
      font-size: 0.85rem;
      color: #666;
      font-family: Arial, sans-serif;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-family: Arial, sans-serif;
      color: var(--deep);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 48px 14px 16px;
      border: 2px solid #e0e6e3;
      border-radius: 10px;
      font-size: 1rem;
      font-family: Arial, sans-serif;
      color: var(--deep);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--sage);
      background: #fff;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      padding: 4px;
    }

    .toggle-pw:hover { color: var(--sage); }

    .toggle-pw svg { width: 20px; height: 20px; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--deep);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: var(--sage); }
    .btn-login:active { transform: scale(0.98); }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.84rem;
      font-family: Arial, sans-serif;
      color: #dc2626;
      margin-top: 16px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      font-family: Arial, sans-serif;
      color: #aaa;
    }

    .login-footer a {
      color: var(--sage);
      text-decoration: none;
    }

    .login-footer a:hover { text-decoration: underline; }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <div class="mark">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 0v9m0 0l4-4m-4 4l-4-4"/></svg>
    </div>
    <h1>Mood &amp; Mind Centre</h1>
    <p>Staff Portal</p>
  </div>

  <div class="login-card">
    <h2>Welcome back</h2>
    <p>Enter your practice password to access the staff dashboard.</p>

    <form id="loginForm" autocomplete="off">
      <label for="pw">Password</label>
      <div class="input-wrap">
        <input type="password" id="pw" placeholder="••••••••••" autocomplete="current-password" required />
        <button type="button" class="toggle-pw" onclick="togglePw()" title="Show/hide password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">Sign In</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
  </div>

  <div class="login-footer">
    <a href="../index.html">← Back to main website</a>
  </div>
</div>

<script>
  // Check already logged in
  if (sessionStorage.getItem('mmcAdmin') === 'true') {
    window.location.href = 'dashboard.html';
  }

  const HASH = 'e6d8c1fb786acbd982941ef60b4a0ed445c636a5c104f758e4c4844cb7bcd6a6';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errMsg = document.getElementById('errorMsg');

    btnText.style.display = 'none';
    spinner.style.display = 'block';
    errMsg.classList.remove('show');

    const pw = document.getElementById('pw').value;
    const hash = await sha256(pw);

    await new Promise(r => setTimeout(r, 500)); // brief delay feels more secure

    spinner.style.display = 'none';
    btnText.style.display = 'block';

    if (hash === HASH) {
      sessionStorage.setItem('mmcAdmin', 'true');
      window.location.href = 'dashboard.html';
    } else {
      errMsg.classList.add('show');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });

  function togglePw() {
    const input = document.getElementById('pw');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
